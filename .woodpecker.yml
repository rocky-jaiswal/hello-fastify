steps:
  - name: lint-and-build
    image: node:22-alpine
    commands:
      - npm ci
      - npm run lint
      - npm run build

  - name: test
    image: node:22-alpine
    commands:
      - npm ci
      - npm test -- --passWithNoTests

  - name: build-and-push
    image: woodpeckerci/plugin-kaniko
    environment:
      AWS_REGION: eu-central-1
    settings:
      dockerfile: Dockerfile
      context: .
      registry: 750324395434.dkr.ecr.eu-central-1.amazonaws.com
      repo: app-eks-api-dev
      tags: ${CI_COMMIT_SHA}
    # No registry credentials set — kaniko's built-in ECR credential helper
    # picks up the devops-cluster-dev EC2 instance profile automatically.
    # No docker socket needed — no privileged mode.
    when:
      branch: main

  - name: update-image-tag
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git config user.email "ci@woodpecker"
      - git config user.name "Woodpecker CI"
      # Clone-time credentials (netrc) aren't available in custom steps —
      # explicitly authenticate this push with the github_token secret.
      - git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/rocky-jaiswal/hello-fastify.git
      - 'sed -i "s/tag:.*/tag: ${CI_COMMIT_SHA}/" helm/hello-fastify/values-dev.yaml'
      - 'git commit -am "ci: update image tag to ${CI_COMMIT_SHA}"'
      # CI checkouts are detached HEAD — push explicitly to main, not "git push"
      - git push origin HEAD:main
    # github_token: a GitHub PAT with repo write access, stored in Woodpecker's
    # per-repo secrets (UI -> repo -> Secrets)
    when:
      branch: main
