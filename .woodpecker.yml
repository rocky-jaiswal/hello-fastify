steps:
  - name: lint-and-build
    image: node:22-alpine
    commands:
      - npm ci
      - npm run lint
      - npm run build

  - name: test
    image: node:22-alpine
    commands:
      - npm ci
      - npm test -- --passWithNoTests

  - name: build-and-push
    image: woodpeckerci/plugin-kaniko
    environment:
      AWS_REGION: eu-central-1
    settings:
      dockerfile: Dockerfile
      context: .
      registry: 750324395434.dkr.ecr.eu-central-1.amazonaws.com
      repo: app-eks-api-dev
      tags: ${CI_COMMIT_SHA}
    # No registry credentials set — kaniko's built-in ECR credential helper
    # picks up the devops-cluster-dev EC2 instance profile automatically.
    # No docker socket needed — no privileged mode.
    when:
      branch: main

  # No "update-image-tag" step: it needs to git-push the new tag back to
  # values-dev.yaml so ArgoCD picks it up, but the github_token secret never
  # reached this step's environment (from_secret resolved empty, cause
  # unresolved — not an event-scoping issue, tried recreating the secret too).
  # For now, update helm/hello-fastify/values-dev.yaml's image.tag by hand
  # after a build. Real fix: debug the secret further, or replace this with
  # ArgoCD Image Updater (purpose-built for this, no CI-side git push needed).
