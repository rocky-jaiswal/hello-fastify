replicaCount: 1

image:
  repository: 750324395434.dkr.ecr.eu-central-1.amazonaws.com/app-eks-api-dev
  tag: latest
  pullPolicy: Always

# This K3s cluster isn't EKS-optimized, so containerd has no built-in ECR auth.
# ecr-pull-secret is a manually-created docker-registry secret (12h token) —
# see PLAN.md Known Gaps for the real fix (kubelet ECR credential provider).
imagePullSecrets:
  - name: ecr-pull-secret

containerPort: 3001

service:
  type: NodePort
  port: 3001
  nodePort: 31001

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /v1/health
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /v1/health
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 10
